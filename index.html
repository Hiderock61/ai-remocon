<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIリモコン v0.3</title>
    <style>
/* ─── リセット & 変数 ─── */
:root {
    --bg: #f2f2f7;
    --text: #1c1c1e;
    --sub-text: #636366;
    --card: #ffffff;
    --border: #e5e5ea;
    --primary: #0071e3;
    --primary-dark: #0060c7;
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-pill: 28px;
    --shadow: 0 1px 5px rgba(0,0,0,0.07);
    --shadow-btn: 0 4px 14px rgba(0,113,227,0.28);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

html { height: 100%; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                 "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    min-height: 100dvh;
    padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
}

#app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* ─── ヘッダー ─── */
header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
}

header.hidden { display: none; }

.back-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 15px;
    font-weight: 600;
    padding: 8px 12px 8px 0;
    cursor: pointer;
    flex-shrink: 0;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.breadcrumb {
    font-size: 13px;
    color: var(--sub-text);
    margin-left: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ─── メイン ─── */
main {
    flex: 1;
    padding: 20px 16px 0;
}

.screen {
    display: none;
    animation: fadeIn 0.22s ease;
}

.screen.active { display: block; }

/* ─── トップ画面 ─── */
.top-header {
    text-align: center;
    margin-bottom: 22px;
}

.top-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: var(--text);
}

.top-subtitle {
    font-size: 13px;
    color: var(--sub-text);
    margin-top: 4px;
}

/* ─── 8ボタングリッド ─── */
.handy-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.handy-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 16px 16px 14px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s, box-shadow 0.12s;
    min-height: 108px;
    box-shadow: var(--shadow);
    user-select: none;
    position: relative;
    overflow: hidden;
}

.handy-btn:active {
    transform: scale(0.95);
    opacity: 0.85;
}

.handy-icon {
    font-size: 34px;
    line-height: 1;
    margin-bottom: 10px;
    display: block;
}

.handy-label {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text);
    text-align: left;
}

/* カラーアクセント（左上の細いライン） */
.handy-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    border-radius: 4px 0 0 4px;
    background: transparent;
}

.handy-btn[data-id="困った"]::before  { background: #ff6b6b; }
.handy-btn[data-id="暇"]::before      { background: #51cf66; }
.handy-btn[data-id="ほんと"]::before  { background: #fcc419; }
.handy-btn[data-id="何が"]::before    { background: #ff922b; }
.handy-btn[data-id="だから"]::before  { background: #cc5de8; }
.handy-btn[data-id="教えて"]::before  { background: #339af0; }
.handy-btn[data-id="悩み"]::before    { background: #20c997; }
.handy-btn[data-id="英語"]::before    { background: #f06595; }

/* ─── 結果画面 ─── */
.result-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: -0.3px;
}

.result-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.prompt-box {
    background: var(--card);
    padding: 20px;
    border-radius: var(--radius-lg);
    border: 1.5px solid var(--border);
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    min-height: 180px;
    box-shadow: var(--shadow);
    color: #3a3a3c;
}

.copy-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
    box-shadow: var(--shadow-btn);
    user-select: none;
    min-height: 56px;
    width: 100%;
    display: block;
}

.copy-btn:active {
    transform: scale(0.97);
    background: var(--primary-dark);
}

/* ─── 外部AIリンク ─── */
.ai-links-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 2px;
}

.ai-links-label {
    font-size: 13px;
    color: var(--sub-text);
    text-align: center;
}

.ai-links-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.ai-link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    min-height: 48px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s, background 0.12s;
    box-shadow: var(--shadow);
    user-select: none;
    text-align: center;
}

.ai-link-btn:active {
    transform: scale(0.95);
    opacity: 0.8;
    background: #f0f0f5;
}

.ai-link-icon {
    font-size: 18px;
    flex-shrink: 0;
    line-height: 1;
}

/* ─── フッター（トップ画面のみ） ─── */
.top-footer {
    margin-top: 28px;
    padding-bottom: 8px;
    text-align: center;
    font-size: 11px;
    color: #aeaeb2;
    letter-spacing: 0.2px;
}

/* ─── トースト ─── */
.toast {
    position: fixed;
    bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(28,28,30,0.88);
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    opacity: 1;
    transition: opacity 0.4s ease;
    white-space: nowrap;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
}

.toast.hidden {
    opacity: 0;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>
<div id="app">

    <!-- ヘッダー（結果画面のみ表示） -->
    <header id="header" class="hidden">
        <button id="back-btn" class="back-btn">◀ 戻る</button>
        <div id="breadcrumb" class="breadcrumb"></div>
    </header>

    <main id="main-content">

        <!-- 画面1：トップ（8ボタン） -->
        <section id="screen-top" class="screen active">
            <div class="top-header">
                <div class="top-title">AIリモコン v0.3</div>
                <div class="top-subtitle">ボタンを押して、コピーして、AIに貼る</div>
            </div>

            <div class="handy-grid" id="handy-grid">
                <!-- JSで生成 -->
            </div>

            <div class="top-footer">by オノノケホールディングス😲©️</div>
        </section>

        <!-- 画面2：結果（プロンプト表示） -->
        <section id="screen-result" class="screen">
            <h1 class="result-title" id="result-title">コピーしてAIへ</h1>
            <div class="result-container">
                <div id="prompt-display" class="prompt-box"></div>
                <button id="copy-btn" class="copy-btn">コピーする</button>
                <div class="ai-links-section">
                    <p class="ai-links-label">コピーしたら、下のAIに貼ってください</p>
                    <div class="ai-links-grid">
                        <a href="https://chatgpt.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">
                            <span class="ai-link-icon">🤖</span>ChatGPTを開く
                        </a>
                        <a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">
                            <span class="ai-link-icon">✨</span>Geminiを開く
                        </a>
                        <a href="https://copilot.microsoft.com/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">
                            <span class="ai-link-icon">🪟</span>Copilotを開く
                        </a>
                        <a href="https://claude.ai/" target="_blank" rel="noopener noreferrer" class="ai-link-btn">
                            <span class="ai-link-icon">🌿</span>Claudeを開く
                        </a>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="toast" class="toast hidden">コピーしました。外部AIに貼ってください 📋</div>
</div>

<script>
/* ─── データ定義 ─── */
const BUTTONS = [
  {
    id: "困った",
    icon: "😵",
    label: "なんか困った",
    prompt: `これから、今困っていることを送ります。
状況を大きくしすぎず、今できる一手を1つか2つに絞って整理してください。
すぐに結論を決めつけず、必要なら確認したいことを1つだけ質問してください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "暇",
    icon: "🥒",
    label: "なんか暇",
    prompt: `これから、今の気分や状況を送ります。
本質は残したまま、くだらない例え・生活感のある比喩・小さな寸劇のような形で、少し笑える方向に広げてください。
ただふざけるだけではなく、聞きやすくなる形にしてください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "ほんと",
    icon: "🕵️",
    label: "これほんと？",
    prompt: `これから、気になっている情報や主張を送ります。
断定できること・推論に留まること・確認が必要なことを分けて整理してください。
本当か嘘かを急いで決めつけず、根拠と確認ポイントも教えてください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "何が",
    icon: "😲",
    label: "何が起こったんだ",
    prompt: `これから、気になっている出来事や現象について送ります。
それを「何が起きたのか」「なぜそう見えるのか」「考えられる背景」「まだ分からないこと」に分けて整理してください。
断定できることと推測を分けてください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "だから",
    icon: "🤯",
    label: "だからなんだ",
    prompt: `これから、文章・考え・状況を送ります。
それについて、

1. だからなんだ？
2. だからどう？
3. それで何？
4. ようは何が言いたい？

の4つに分けて整理してください。
責める口調ではなく、考えを扱いやすくするための分解としてお願いします。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "教えて",
    icon: "🦉",
    label: "教えてください",
    prompt: `これから、知りたいことを送ります。
それが「やり方」「行き方」「方法」「概念定義」のどれに近いかを判断し、初心者にもわかるように説明してください。
概念の場合は、短い定義に加えて、物語や寸劇に例えて説明してください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "悩み",
    icon: "🧩",
    label: "この悩み、どう扱う？",
    prompt: `これから、悩みや困っていることを送ります。
感情・事実・関係性・現実的な制約・今できる一手に分けて整理してください。
すぐに結論を決めつけず、複数の視点からどう扱うのがよさそうか考えてください。
まだ内容は送っていないので、次の入力を待ってください。`
  },
  {
    id: "英語",
    icon: "🗣️",
    label: "英語圏ならどう言う？",
    prompt: `これから、日本語の言葉や文章を送ります。
直訳ではなく、英語圏で自然に伝わる言い方にしてください。
意味・温度感・丁寧さ・距離感ができるだけ近くなるようにしてください。
必要なら、

1. 自然な英語
2. 直訳に近い英語
3. カジュアルな英語

の違いも短く出してください。
まだ文章は送っていないので、次の入力を待ってください。`
  }
];

/* ─── 状態 ─── */
let currentButton = null;

/* ─── DOM参照 ─── */
const screenTop    = document.getElementById('screen-top');
const screenResult = document.getElementById('screen-result');
const header       = document.getElementById('header');
const backBtn      = document.getElementById('back-btn');
const breadcrumb   = document.getElementById('breadcrumb');
const promptDisplay = document.getElementById('prompt-display');
const resultTitle  = document.getElementById('result-title');
const copyBtn      = document.getElementById('copy-btn');
const toast        = document.getElementById('toast');
const handyGrid    = document.getElementById('handy-grid');

/* ─── ボタン生成 ─── */
BUTTONS.forEach(btn => {
    const el = document.createElement('button');
    el.className = 'handy-btn';
    el.setAttribute('data-id', btn.id);
    el.setAttribute('type', 'button');
    el.innerHTML = `
        <span class="handy-icon">${btn.icon}</span>
        <span class="handy-label">${btn.label}</span>
    `;
    el.addEventListener('click', () => showResult(btn));
    handyGrid.appendChild(el);
});

/* ─── 画面遷移 ─── */
function showResult(btn) {
    currentButton = btn;

    // プロンプトをセット
    promptDisplay.textContent = btn.prompt;
    resultTitle.textContent   = btn.icon + ' ' + btn.label;
    breadcrumb.textContent    = '「' + btn.label + '」';

    // 画面切替
    screenTop.classList.remove('active');
    screenResult.classList.add('active');
    header.classList.remove('hidden');

    // スクロールをトップに戻す
    window.scrollTo({ top: 0, behavior: 'instant' });
}

function showTop() {
    screenResult.classList.remove('active');
    screenTop.classList.add('active');
    header.classList.add('hidden');
    currentButton = null;
    window.scrollTo({ top: 0, behavior: 'instant' });
}

backBtn.addEventListener('click', showTop);

/* ─── コピー ─── */
copyBtn.addEventListener('click', () => {
    if (!currentButton) return;
    const text = currentButton.prompt;

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
    } else {
        fallbackCopy(text);
    }
});

function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    showToast();
}

let toastTimer = null;
function showToast() {
    toast.classList.remove('hidden');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add('hidden'), 2000);
}
</script>
</body>
</html>
