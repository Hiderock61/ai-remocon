<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIリモコン v0.1</title>
    <style>
:root {
    --bg-color: #f2f2f7;
    --text-color: #1c1c1e;
    --card-bg: #ffffff;
    --primary: #0071e3;
    --border: #e5e5ea;
    --radius: 16px;
    --thick-bg: #eef3ff;
    --thick-border: #c7d8f8;
    --silly-bg: #f0fff4;
    --silly-border: #b2dfcb;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.5;
    padding-bottom: env(safe-area-inset-bottom, 16px);
}

#app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background-color: var(--bg-color);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
}

header.hidden {
    display: none;
}

.icon-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-size: 15px;
    font-weight: 600;
    padding: 6px 12px 6px 0;
    cursor: pointer;
    flex-shrink: 0;
}

.breadcrumb {
    font-size: 13px;
    color: #636366;
    margin-left: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

main {
    flex: 1;
    padding: 20px 16px;
}

.screen {
    display: none;
    animation: fadeIn 0.25s ease;
}

.screen.active {
    display: block;
}

.screen-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: -0.3px;
}

.category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.category-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
    background-color: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    text-align: center;
    min-height: 110px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    user-select: none;
}

.category-btn:active {
    transform: scale(0.95);
    opacity: 0.85;
}

.category-btn.thick {
    background-color: var(--thick-bg);
    border-color: var(--thick-border);
}

.category-btn.silly {
    background-color: var(--silly-bg);
    border-color: var(--silly-border);
}

.category-icon {
    font-size: 36px;
    margin-bottom: 10px;
    line-height: 1;
}

.category-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-color);
}

.list-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.list-item {
    padding: 18px 20px;
    background-color: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    user-select: none;
}

.list-item:active {
    transform: scale(0.97);
    opacity: 0.8;
}

.result-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.prompt-box {
    background-color: var(--card-bg);
    padding: 20px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    font-size: 15px;
    line-height: 1.7;
    white-space: pre-wrap;
    min-height: 160px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    color: #3a3a3c;
}

.primary-btn {
    background-color: var(--primary);
    color: white;
    border: none;
    border-radius: 28px;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: background-color 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
    user-select: none;
}

.primary-btn:active {
    transform: scale(0.97);
    background-color: #0060c7;
}

.toast {
    position: fixed;
    bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(28, 28, 30, 0.88);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    opacity: 1;
    transition: opacity 0.4s ease;
    white-space: nowrap;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

.toast.hidden {
    opacity: 0;
    pointer-events: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>
    <div id="app">
        <header id="header" class="hidden">
            <button id="back-btn" class="icon-btn">◀ 戻る</button>
            <div id="breadcrumb" class="breadcrumb"></div>
        </header>

        <main id="main-content">
            <section id="screen-category" class="screen active">
                <h1 class="screen-title">今どこ？</h1>
                <div id="category-list" class="category-grid"></div>
            </section>

            <section id="screen-problem" class="screen">
                <h1 class="screen-title">何に困ってる？</h1>
                <div id="problem-list" class="list-container"></div>
            </section>

            <section id="screen-action" class="screen">
                <h1 class="screen-title">AIに何をさせたい？</h1>
                <div id="action-list" class="list-container"></div>
            </section>

            <section id="screen-result" class="screen">
                <h1 class="screen-title">コピーしてAIへ</h1>
                <div class="result-container">
                    <div id="prompt-display" class="prompt-box"></div>
                    <button id="copy-btn" class="primary-btn">コピーする</button>
                </div>
            </section>
        </main>

        <div id="toast" class="toast hidden">コピーしました。外部AIに貼ってください 📋</div>
    </div>

document.addEventListener('DOMContentLoaded', () => {
    const state = { category: null, problem: null, action: null, history: [] };

    const screens = {
        category: document.getElementById('screen-category'),
        problem:  document.getElementById('screen-problem'),
        action:   document.getElementById('screen-action'),
        result:   document.getElementById('screen-result')
    };

    const header      = document.getElementById('header');
    const backBtn     = document.getElementById('back-btn');
    const breadcrumb  = document.getElementById('breadcrumb');
    const categoryList= document.getElementById('category-list');
    const problemList = document.getElementById('problem-list');
    const actionList  = document.getElementById('action-list');
    const promptDisplay = document.getElementById('prompt-display');
    const copyBtn     = document.getElementById('copy-btn');
    const toast       = document.getElementById('toast');

    renderCategories();
    showScreen('category');
    backBtn.addEventListener('click', goBack);
    copyBtn.addEventListener('click', copyPrompt);

    function showScreen(screenId) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenId].classList.add('active');

        if (state.history[state.history.length - 1] !== screenId) {
            state.history.push(screenId);
        }

        if (screenId === 'category') {
            header.classList.add('hidden');
            state.history = ['category'];
        } else {
            header.classList.remove('hidden');
            updateBreadcrumb(screenId);
        }
        window.scrollTo(0, 0);
    }

    function goBack() {
        if (state.history.length > 1) {
            state.history.pop();
            const prev = state.history.pop();
            showScreen(prev);
        }
    }

    function updateBreadcrumb(screenId) {
        if (screenId === 'problem') {
            const cat = data.categories.find(c => c.id === state.category);
            breadcrumb.textContent = `「${cat.title}」のとき`;
        } else if (screenId === 'action') {
            const prob = data.problems[state.category].find(p => p.id === state.problem);
            breadcrumb.textContent = `「${prob.text}」とき`;
        } else if (screenId === 'result') {
            const act = data.actions[state.problem].find(a => a.id === state.action);
            breadcrumb.textContent = `「${act.text}」`;
        }
    }

    function renderCategories() {
        categoryList.innerHTML = '';
        data.categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `category-btn ${cat.type}`;
            btn.innerHTML = `<div class="category-icon">${cat.icon}</div><div class="category-title">${cat.title}</div>`;
            btn.addEventListener('click', () => {
                state.category = cat.id;
                renderProblems();
                showScreen('problem');
            });
            categoryList.appendChild(btn);
        });
    }

    function renderProblems() {
        problemList.innerHTML = '';
        (data.problems[state.category] || []).forEach(prob => {
            const btn = document.createElement('div');
            btn.className = 'list-item';
            btn.textContent = prob.text;
            btn.addEventListener('click', () => {
                state.problem = prob.id;
                renderActions();
                showScreen('action');
            });
            problemList.appendChild(btn);
        });
    }

    function renderActions() {
        actionList.innerHTML = '';
        (data.actions[state.problem] || []).forEach(act => {
            const btn = document.createElement('div');
            btn.className = 'list-item';
            btn.textContent = act.text;
            btn.addEventListener('click', () => {
                state.action = act.id;
                promptDisplay.textContent = act.prompt;
                showScreen('result');
            });
            actionList.appendChild(btn);
        });
    }

    function copyPrompt() {
        const text = promptDisplay.textContent;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(showToast);
        } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            try { document.execCommand('copy'); showToast(); } catch(e) {}
            ta.remove();
        }
    }

    function showToast() {
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2000);
    }
});
    </script>
</body>
</html>
