<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIリモコン v0.4 修正版</title>
<style>
/* ─── 変数 ─── */
:root {
  --bg: #f2f2f7;
  --text: #1c1c1e;
  --sub: #636366;
  --card: #ffffff;
  --border: #e5e5ea;
  --primary: #0071e3;
  --primary-dk: #0060c7;
  --wide-bg: #eef3ff;
  --wide-border: #c7d8f8;
  --silly-bg: #f0fff4;
  --silly-border: #b2dfcb;
  --radius: 16px;
  --radius-sm: 12px;
  --pill: 28px;
  --shadow: 0 1px 5px rgba(0,0,0,0.07);
  --shadow-btn: 0 4px 14px rgba(0,113,227,0.28);
}

/* ─── リセット ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

html { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont,
    "Hiragino Sans", "Hiragino Kaku Gothic ProN",
    "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100dvh;
  padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ─── ヘッダー ─── */
#header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}
#header.hidden { display: none; }

#back-btn {
  background: none;
  border: none;
  color: var(--primary);
  font-size: 15px;
  font-weight: 600;
  padding: 8px 12px 8px 0;
  cursor: pointer;
  flex-shrink: 0;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 4px;
}

#breadcrumb {
  font-size: 13px;
  color: var(--sub);
  margin-left: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ─── メイン ─── */
main { flex: 1; padding: 20px 16px 0; }

.screen { display: none; animation: fadeIn .22s ease; }
.screen.active { display: block; }

/* ─── 画面タイトル ─── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: -.3px;
}

/* ─── トップ画面 ─── */
.top-lead {
  text-align: center;
  margin-bottom: 20px;
}
.top-lead-title {
  font-size: 19px;
  font-weight: 800;
  letter-spacing: -.4px;
}
.top-lead-sub {
  font-size: 13px;
  color: var(--sub);
  margin-top: 5px;
  line-height: 1.6;
}

/* ワイドボタン（どこでも困ってる・くだらない） */
.wide-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 18px 20px;
  border-radius: var(--radius);
  border: 1.5px solid var(--wide-border);
  background: var(--wide-bg);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .12s, opacity .12s;
  box-shadow: var(--shadow);
  user-select: none;
  min-height: 60px;
  text-align: center;
  letter-spacing: -.2px;
}
.wide-btn.silly {
  background: var(--silly-bg);
  border-color: var(--silly-border);
}
.wide-btn:active { transform: scale(.97); opacity: .85; }

/* 中央ラベル */
.section-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  text-align: center;
  margin: 16px 0 10px;
  letter-spacing: .3px;
  text-transform: uppercase;
}

/* カテゴリグリッド */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.cat-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 14px 14px 12px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform .12s, opacity .12s;
  min-height: 96px;
  box-shadow: var(--shadow);
  user-select: none;
  position: relative;
}
.cat-btn:active { transform: scale(.95); opacity: .85; }

.cat-icon {
  font-size: 30px;
  line-height: 1;
  margin-bottom: 8px;
  display: block;
}
.cat-label {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--text);
  text-align: left;
}

/* フッター */
.top-footer {
  margin-top: 24px;
  padding-bottom: 4px;
  text-align: center;
  font-size: 11px;
  color: #aeaeb2;
}

/* ─── シナリオ・アクションリスト ─── */
.list-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.list-item {
  padding: 18px 20px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: transform .12s, opacity .12s;
  box-shadow: var(--shadow);
  user-select: none;
  min-height: 56px;
  display: flex;
  align-items: center;
}
.list-item:active { transform: scale(.97); opacity: .8; }

/* ─── プロンプト画面 ─── */
.result-wrap {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.result-meta {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.6;
}
.result-meta strong {
  color: var(--text);
  font-weight: 600;
}

.prompt-box {
  background: var(--card);
  padding: 20px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  font-size: 15px;
  line-height: 1.8;
  white-space: pre-wrap;
  min-height: 160px;
  box-shadow: var(--shadow);
  color: #3a3a3c;
}

.copy-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--pill);
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: background .15s, transform .1s;
  letter-spacing: .3px;
  box-shadow: var(--shadow-btn);
  user-select: none;
  min-height: 56px;
  width: 100%;
  display: block;
}
.copy-btn:active { transform: scale(.97); background: var(--primary-dk); }

/* ─── 外部AIリンク ─── */
.ai-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 2px;
}
.ai-label {
  font-size: 13px;
  color: var(--sub);
  text-align: center;
}
.ai-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.ai-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 12px;
  min-height: 48px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  transition: transform .12s, opacity .12s, background .12s;
  box-shadow: var(--shadow);
  user-select: none;
  text-align: center;
}
.ai-btn:active { transform: scale(.95); opacity: .8; background: #f0f0f5; }
.ai-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }

/* ─── トースト ─── */
#toast {
  position: fixed;
  bottom: calc(32px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  background: rgba(28,28,30,.88);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 100;
  opacity: 1;
  transition: opacity .4s ease;
  white-space: nowrap;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  pointer-events: none;
}
#toast.hidden { opacity: 0; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<!-- ─── ロジック ─── -->
<script>
/* ── データ読み込み ── */
const APP_DATA = JSON.parse(document.getElementById('app-data').textContent);
const LOCATIONS = APP_DATA.locations;
const LOC_MAP = {};
LOCATIONS.forEach(l => { LOC_MAP[l.id] = l; });

/* ── DOM ── */
const header        = document.getElementById('header');
const backBtn       = document.getElementById('back-btn');
const breadcrumb    = document.getElementById('breadcrumb');
const toast         = document.getElementById('toast');
const copyBtn       = document.getElementById('copy-btn');
const promptDisplay = document.getElementById('prompt-display');
const resultMeta    = document.getElementById('result-meta');
const catGrid       = document.getElementById('cat-grid');
const scenarioList  = document.getElementById('scenario-list');
const scenarioTitle = document.getElementById('scenario-title');
const actionList    = document.getElementById('action-list');

const screens = {
  location: document.getElementById('screen-location'),
  scenario: document.getElementById('screen-scenario'),
  action:   document.getElementById('screen-action'),
  prompt:   document.getElementById('screen-prompt')
};

/* ── 状態 ── */
let state = {
  step: 'location',      // location | scenario | action | prompt
  location: null,        // location object
  scenario: null,        // scenario object
  action: null           // action object
};

/* ── カテゴリグリッド生成（wide以外） ── */
const GRID_LOCS = LOCATIONS.filter(l => l.id !== 'anywhere' && l.id !== 'silly');
GRID_LOCS.forEach(loc => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cat-btn';
  // アイコンとラベルを分割
  const parts = loc.label.match(/^(\S+)\s(.+)$/);
  const icon  = parts ? parts[1] : loc.label;
  const label = parts ? parts[2] : '';
  btn.innerHTML = `<span class="cat-icon">${icon}</span><span class="cat-label">${label}</span>`;
  btn.addEventListener('click', () => selectLocation(loc));
  catGrid.appendChild(btn);
});

/* ── ワイドボタンのイベント ── */
document.querySelectorAll('.wide-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const locId = btn.getAttribute('data-loc');
    const loc = LOC_MAP[locId];
    if (loc) selectLocation(loc);
  });
});

/* ── 画面切替 ── */
function showScreen(name) {
  Object.keys(screens).forEach(k => {
    screens[k].classList.toggle('active', k === name);
  });
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function updateHeader() {
  if (state.step === 'location') {
    header.classList.add('hidden');
    breadcrumb.textContent = '';
    return;
  }
  header.classList.remove('hidden');
  if (state.step === 'scenario') {
    breadcrumb.textContent = state.location.label;
  } else if (state.step === 'action') {
    breadcrumb.textContent = state.location.label + ' › ' + state.scenario.label;
  } else if (state.step === 'prompt') {
    const sc = state.scenario ? state.scenario.label : '';
    breadcrumb.textContent = state.location.label + (sc ? ' › ' + sc : '');
  }
}

/* ── location選択 ── */
function selectLocation(loc) {
  state.location = loc;
  state.scenario = null;
  state.action   = null;
  state.step     = 'scenario';

  // シナリオリスト生成
  scenarioTitle.textContent = '何に困ってる？';
  scenarioList.innerHTML = '';
  loc.scenarios.forEach(sc => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'list-item';
    btn.textContent = sc.label;
    btn.addEventListener('click', () => selectScenario(sc));
    scenarioList.appendChild(btn);
  });

  updateHeader();
  showScreen('scenario');
}

/* ── scenario選択 ── */
function selectScenario(sc) {
  state.scenario = sc;
  state.action   = null;
  state.step     = 'action';

  if (sc.actions.length === 1) {
    // actions が1つだけ → action画面をスキップ
    selectAction(sc.actions[0]);
    return;
  }

  // アクションリスト生成
  actionList.innerHTML = '';
  sc.actions.forEach(act => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'list-item';
    btn.textContent = act.label;
    btn.addEventListener('click', () => selectAction(act));
    actionList.appendChild(btn);
  });

  updateHeader();
  showScreen('action');
}

/* ── action選択 → prompt表示 ── */
function selectAction(act) {
  state.action = act;
  state.step   = 'prompt';

  promptDisplay.textContent = act.commonPrompt;
  resultMeta.innerHTML =
    '<strong>' + state.location.label + '</strong>' +
    ' › ' + state.scenario.label;

  updateHeader();
  showScreen('prompt');
}

/* ── 戻るボタン ── */
backBtn.addEventListener('click', () => {
  if (state.step === 'prompt') {
    // actionsが1つだった場合はscenarioへ、複数だったらactionへ
    if (state.scenario && state.scenario.actions.length > 1) {
      state.step = 'action';
      updateHeader();
      showScreen('action');
    } else {
      state.step = 'scenario';
      updateHeader();
      showScreen('scenario');
    }
  } else if (state.step === 'action') {
    state.step = 'scenario';
    updateHeader();
    showScreen('scenario');
  } else if (state.step === 'scenario') {
    state.step = 'location';
    state.location = null;
    updateHeader();
    showScreen('location');
  }
});

/* ── コピー ── */
copyBtn.addEventListener('click', () => {
  if (!state.action) return;
  const text = state.action.commonPrompt;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
});

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  showToast();
}

let toastTimer = null;
function showToast() {
  toast.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 2000);
}
</script>
